<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEON CORE - Admin</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#030b10; color:#94a3b8; font-family:'Courier New',monospace; min-height:100vh; }
#login-screen { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; gap:16px; }
#login-screen h1 { color:#00ffff; font-size:20px; letter-spacing:4px; }
#login-screen input { background:#0a1a2a; border:1px solid #0a3344; color:#00ffff; font-family:'Courier New',monospace; font-size:14px; padding:12px 16px; width:280px; text-align:center; }
#login-screen button { background:#030b10; border:1px solid #00ffff; color:#00ffff; font-family:'Courier New',monospace; font-size:13px; padding:10px 32px; cursor:pointer; letter-spacing:2px; }
#login-screen .error { color:#ef4444; font-size:11px; height:16px; }
#admin-screen { display:none; padding:16px; max-width:900px; margin:0 auto; }
.admin-header { display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #0a3344; padding-bottom:12px; margin-bottom:16px; }
.admin-header h1 { color:#00ffff; font-size:16px; letter-spacing:3px; }
.admin-header span { color:#334455; font-size:10px; }
.search-bar { display:flex; gap:8px; margin-bottom:16px; }
.search-bar input { flex:1; background:#0a1a2a; border:1px solid #0a3344; color:#00ffff; font-family:'Courier New',monospace; font-size:12px; padding:8px 12px; }
.search-bar button { background:#030b10; border:1px solid #0a3344; color:#00ffff; font-family:'Courier New',monospace; font-size:11px; padding:8px 16px; cursor:pointer; }
.stats-bar { display:flex; gap:16px; margin-bottom:16px; font-size:11px; flex-wrap:wrap; }
.stats-bar span { color:#556677; }
.stats-bar b { color:#00ffff; }
table { width:100%; border-collapse:collapse; font-size:11px; }
th { text-align:left; color:#00ffff; border-bottom:1px solid #0a3344; padding:8px 6px; font-weight:normal; letter-spacing:1px; }
td { border-bottom:1px solid #0a1a2a; padding:8px 6px; }
tr:hover td { background:#0a1a2a; }
tr { cursor:pointer; }
.uid-cell { color:#556677; font-size:10px; max-width:120px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.gold { color:#f59e0b; }
.gem { color:#00ffff; }
.wave { color:#00ff88; }
.time { color:#334455; font-size:10px; }

/* 유저 상세 모달 */
#user-modal { display:none; position:fixed; inset:0; background:rgba(3,11,16,0.95); z-index:100; align-items:center; justify-content:center; }
#user-modal.show { display:flex; }
.modal-box { background:#0a1a2a; border:1px solid #0a3344; padding:24px; width:90%; max-width:520px; max-height:85vh; overflow-y:auto; }
.modal-title { color:#00ffff; font-size:14px; letter-spacing:2px; margin-bottom:16px; display:flex; justify-content:space-between; align-items:center; }
.modal-close { background:none; border:none; color:#556677; font-size:18px; cursor:pointer; }
.modal-section { color:#00ffff; font-size:11px; letter-spacing:1px; border-bottom:1px solid #0a3344; padding:10px 0 4px; margin:12px 0 6px; }
.modal-section:first-of-type { margin-top:0; }
.modal-row { display:flex; justify-content:space-between; align-items:center; padding:6px 0; border-bottom:1px solid #0a1a2a; }
.modal-row label { color:#556677; font-size:11px; }
.modal-row span { color:#94a3b8; font-size:12px; }
.modal-row input[type="number"] { background:#030b10; border:1px solid #0a3344; color:#f59e0b; font-family:'Courier New',monospace; font-size:13px; padding:4px 8px; width:110px; text-align:right; }
.modal-actions { display:flex; gap:8px; margin-top:16px; position:sticky; bottom:0; background:#0a1a2a; padding:12px 0 0; }
.modal-actions button { flex:1; padding:10px; border:1px solid; font-family:'Courier New',monospace; font-size:11px; cursor:pointer; background:#030b10; letter-spacing:1px; }
.btn-save { border-color:#00ff88 !important; color:#00ff88; }
.btn-cancel { border-color:#334455 !important; color:#556677; }
.toast { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:#0a1a2a; border:1px solid #00ff88; color:#00ff88; font-family:'Courier New',monospace; font-size:11px; padding:8px 20px; z-index:200; display:none; }
</style>
</head>
<body>

<div id="login-screen">
  <h1>NEON CORE ADMIN</h1>
  <input type="password" id="pw-input" placeholder="비밀번호 입력">
  <button id="pw-btn">접속</button>
  <div class="error" id="pw-error"></div>
</div>

<div id="admin-screen">
  <div class="admin-header">
    <h1>NEON CORE ADMIN</h1>
    <span id="total-users">유저: 0명</span>
  </div>
  <div class="search-bar">
    <input type="text" id="search-input" placeholder="유저 ID 검색...">
    <button id="search-btn">검색</button>
    <button id="refresh-btn">새로고침</button>
  </div>
  <div class="stats-bar" id="stats-bar"></div>
  <table>
    <thead>
      <tr>
        <th>유저 ID</th>
        <th>골드</th>
        <th>보석</th>
        <th>최고 웨이브</th>
        <th>마지막 접속</th>
      </tr>
    </thead>
    <tbody id="user-list"></tbody>
  </table>

  <!-- 쿠폰 관리 -->
  <div style="margin-top:32px;border-top:1px solid #0a3344;padding-top:16px;">
    <h2 style="color:#f59e0b;font-size:14px;letter-spacing:2px;margin-bottom:12px;">쿠폰 관리</h2>
    <div style="display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;">
      <input type="text" id="cp-code" placeholder="쿠폰 코드" style="flex:1;min-width:100px;background:#0a1a2a;border:1px solid #0a3344;color:#f59e0b;font-family:monospace;font-size:11px;padding:8px;text-transform:uppercase;">
      <input type="number" id="cp-gold" placeholder="골드" style="width:70px;background:#0a1a2a;border:1px solid #0a3344;color:#f59e0b;font-family:monospace;font-size:11px;padding:8px;">
      <input type="number" id="cp-gems" placeholder="보석" style="width:70px;background:#0a1a2a;border:1px solid #0a3344;color:#00ffff;font-family:monospace;font-size:11px;padding:8px;">
      <input type="number" id="cp-max" placeholder="최대사용 (0=무제한)" style="width:110px;background:#0a1a2a;border:1px solid #0a3344;color:#94a3b8;font-family:monospace;font-size:11px;padding:8px;">
      <button id="cp-create" style="background:#030b10;border:1px solid #f59e0b;color:#f59e0b;font-family:monospace;font-size:11px;padding:8px 14px;cursor:pointer;">생성</button>
    </div>
    <table>
      <thead><tr><th>코드</th><th>골드</th><th>보석</th><th>사용/제한</th><th>삭제</th></tr></thead>
      <tbody id="coupon-list"></tbody>
    </table>
  </div>
</div>

<div id="user-modal">
  <div class="modal-box">
    <div class="modal-title">
      <span>유저 상세</span>
      <button class="modal-close" id="modal-close">&times;</button>
    </div>
    <div id="modal-content"></div>
    <div class="modal-actions">
      <button class="btn-save" id="modal-save">저장</button>
      <button class="btn-cancel" id="modal-cancel">닫기</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey: "AIzaSyCCpTQQ0UbcjVczQKJXremoXMx0XPpslB8",
  authDomain: "neon-core-a8296.firebaseapp.com",
  projectId: "neon-core-a8296",
  storageBucket: "neon-core-a8296.firebasestorage.app",
  messagingSenderId: "30154771900",
  appId: "1:30154771900:web:49a4cfdae31b6714c02fb9"
});
var db = firebase.firestore();

// 관리자 비밀번호 (SHA-256 해시)
var ADMIN_HASH = 'acb8feb9a7014d6df759bcc54724c07828917749cbad6d65ebaf5b2a6d5be378';

async function sha256(str) {
  var buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(function(b){ return b.toString(16).padStart(2,'0'); }).join('');
}

// 로그인
document.getElementById('pw-btn').addEventListener('click', async function(){
  var pw = document.getElementById('pw-input').value;
  var hash = await sha256(pw);
  if (hash === ADMIN_HASH) {
    document.getElementById('login-screen').style.display='none';
    document.getElementById('admin-screen').style.display='block';
    loadUsers();
  } else {
    document.getElementById('pw-error').textContent='비밀번호가 틀립니다';
  }
});
document.getElementById('pw-input').addEventListener('keydown', function(e){
  if(e.key==='Enter') document.getElementById('pw-btn').click();
});

var allUsers = [];
var currentUser = null;

async function loadUsers() {
  var snap = await db.collection('users').orderBy('lastActive','desc').get();
  allUsers = [];
  snap.forEach(function(doc){ allUsers.push({ id:doc.id, data:doc.data() }); });
  renderUsers(allUsers);
  document.getElementById('total-users').textContent = '유저: ' + allUsers.length + '명';

  var totalGold=0, totalGems=0, maxWave=0;
  allUsers.forEach(function(u){
    var p=u.data.perm||{};
    totalGold+=(p.gold||0);
    totalGems+=(p.gems||0);
    if((p.bestWave||0)>maxWave) maxWave=p.bestWave;
  });
  document.getElementById('stats-bar').innerHTML =
    '<span>총 골드: <b>'+totalGold.toLocaleString()+'</b></span>' +
    '<span>총 보석: <b>'+totalGems.toLocaleString()+'</b></span>' +
    '<span>최고 웨이브: <b>'+maxWave+'</b></span>';
}

function renderUsers(list) {
  var tbody = document.getElementById('user-list');
  tbody.innerHTML = '';
  list.forEach(function(u){
    var p = u.data.perm || {};
    var tr = document.createElement('tr');
    tr.innerHTML =
      '<td class="uid-cell">' + u.id + '</td>' +
      '<td class="gold">' + (p.gold||0).toLocaleString() + '</td>' +
      '<td class="gem">' + (p.gems||0).toLocaleString() + '</td>' +
      '<td class="wave">' + (p.bestWave||0) + '</td>' +
      '<td class="time">' + formatTime(u.data.lastActive) + '</td>';
    tr.addEventListener('click', function(){ openModal(u); });
    tbody.appendChild(tr);
  });
}

function formatTime(iso) {
  if (!iso) return '-';
  var d = new Date(iso);
  return d.getFullYear()+'-'+(d.getMonth()+1).toString().padStart(2,'0')+'-'+d.getDate().toString().padStart(2,'0')+' '+d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');
}

// 검색
document.getElementById('search-btn').addEventListener('click', function(){
  var q = document.getElementById('search-input').value.trim().toLowerCase();
  if (!q) { renderUsers(allUsers); return; }
  var filtered = allUsers.filter(function(u){ return u.id.toLowerCase().indexOf(q) !== -1; });
  renderUsers(filtered);
});
document.getElementById('search-input').addEventListener('keydown', function(e){
  if(e.key==='Enter') document.getElementById('search-btn').click();
});
document.getElementById('refresh-btn').addEventListener('click', loadUsers);

// 유저 상세 모달
function openModal(user) {
  currentUser = user;
  var p = user.data.perm || {};
  var ws = p.ws || {};
  var unlocks = p.unlocks || {};

  renderModal();
}

function renderModal() {
  var p = currentUser.data.perm || {};
  var ws = p.ws || {};

  var html = '';

  // 유저 정보
  html += '<div class="modal-row"><label>유저 ID</label><span style="color:#00ffff;font-size:10px;">'+currentUser.id+'</span></div>';
  html += '<div class="modal-row"><label>마지막 접속</label><span>'+formatTime(currentUser.data.lastActive)+'</span></div>';
  html += '<div class="modal-row"><label>UA</label><span style="font-size:9px;color:#334455;word-break:break-all;">'+(currentUser.data.ua||'-')+'</span></div>';

  // 재화
  html += '<div class="modal-section" style="color:#f59e0b;">재화</div>';
  var currencies = [
    { key:'gold',            label:'골드 ◈',      val:p.gold||0 },
    { key:'gems',            label:'보석 ❖',      val:p.gems||0 },
    { key:'prismFragments',  label:'프리즘 파편',  val:p.prismFragments||0 },
  ];
  currencies.forEach(function(c){
    html += '<div class="modal-row"><label>'+c.label+'</label><input type="number" data-field="'+c.key+'" value="'+c.val+'"></div>';
  });

  // 기록
  html += '<div class="modal-section" style="color:#00ff88;">기록</div>';
  var records = [
    { key:'bestWave',     label:'최고 웨이브',  val:p.bestWave||0 },
    { key:'totalKills',   label:'총 처치수',    val:p.totalKills||0 },
    { key:'bossKills',    label:'보스 처치',    val:p.bossKills||0 },
    { key:'upgradeCount', label:'강화 횟수',    val:p.upgradeCount||0 },
  ];
  records.forEach(function(r){
    html += '<div class="modal-row"><label>'+r.label+'</label><input type="number" data-field="'+r.key+'" value="'+r.val+'"></div>';
  });

  // 강화 레벨
  html += '<div class="modal-section">강화 레벨</div>';
  var wsItems = [
    { key:'damage',     label:'대미지',     val:ws.damage||0 },
    { key:'atkspd',     label:'공격 속도',  val:ws.atkspd||0 },
    { key:'critChance', label:'치명타 확률', val:ws.critChance||0 },
    { key:'critMult',   label:'치명타 계수', val:ws.critMult||0 },
    { key:'maxHp',      label:'최대 체력',  val:ws.maxHp||0 },
    { key:'hpRegen',    label:'체력 회복',  val:ws.hpRegen||0 },
    { key:'defense',    label:'방어',       val:ws.defense||0 },
    { key:'lifeSteal',  label:'흡혈',       val:ws.lifeSteal||0 },
    { key:'goldGain',   label:'골드 획득',  val:ws.goldGain||0 },
    { key:'gemGain',    label:'보석 획득',  val:ws.gemGain||0 },
  ];
  wsItems.forEach(function(w){
    html += '<div class="modal-row"><label>'+w.label+'</label><input type="number" data-ws="'+w.key+'" value="'+w.val+'"></div>';
  });

  document.getElementById('modal-content').innerHTML = html;
  document.getElementById('user-modal').classList.add('show');
}

document.getElementById('modal-close').addEventListener('click', closeModal);
document.getElementById('modal-cancel').addEventListener('click', closeModal);
function closeModal() { document.getElementById('user-modal').classList.remove('show'); currentUser=null; }

// 저장
document.getElementById('modal-save').addEventListener('click', async function(){
  if (!currentUser) return;
  var updates = {};

  // 재화 + 기록 입력값
  document.querySelectorAll('#modal-content input[data-field]').forEach(function(inp){
    updates['perm.'+inp.dataset.field] = parseInt(inp.value)||0;
  });

  // 강화 레벨
  document.querySelectorAll('#modal-content input[data-ws]').forEach(function(inp){
    updates['perm.ws.'+inp.dataset.ws] = parseInt(inp.value)||0;
  });

  await db.collection('users').doc(currentUser.id).update(updates);
  showToast('저장 완료: ' + currentUser.id);
  closeModal();
  loadUsers();
});

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display = 'block';
  setTimeout(function(){ t.style.display='none'; }, 2000);
}

// ── 쿠폰 관리 ──
async function loadCoupons() {
  var snap = await db.collection('coupons').get();
  var tbody = document.getElementById('coupon-list');
  tbody.innerHTML = '';
  snap.forEach(function(doc){
    var d = doc.data();
    var tr = document.createElement('tr');
    tr.innerHTML =
      '<td style="color:#f59e0b;">' + doc.id + '</td>' +
      '<td class="gold">' + (d.gold||0) + '</td>' +
      '<td class="gem">' + (d.gems||0) + '</td>' +
      '<td>' + (d.usedCount||0) + '/' + (d.maxUses||'∞') + '</td>' +
      '<td><button data-del="'+doc.id+'" style="background:none;border:1px solid #ef4444;color:#ef4444;font-family:monospace;font-size:9px;padding:3px 8px;cursor:pointer;">삭제</button></td>';
    tr.querySelector('[data-del]').addEventListener('click', async function(){
      await db.collection('coupons').doc(doc.id).delete();
      showToast('쿠폰 삭제: ' + doc.id);
      loadCoupons();
    });
    tbody.appendChild(tr);
  });
}

document.getElementById('cp-create').addEventListener('click', async function(){
  var code = document.getElementById('cp-code').value.trim().toUpperCase();
  var gold = parseInt(document.getElementById('cp-gold').value)||0;
  var gems = parseInt(document.getElementById('cp-gems').value)||0;
  var maxUses = parseInt(document.getElementById('cp-max').value)||0;
  if (!code) { showToast('코드를 입력하세요'); return; }
  if (!gold && !gems) { showToast('보상을 입력하세요'); return; }
  await db.collection('coupons').doc(code).set({
    gold: gold, gems: gems, maxUses: maxUses, usedCount: 0,
    created: new Date().toISOString()
  });
  showToast('쿠폰 생성: ' + code);
  document.getElementById('cp-code').value = '';
  document.getElementById('cp-gold').value = '';
  document.getElementById('cp-gems').value = '';
  document.getElementById('cp-max').value = '';
  loadCoupons();
});

// 로그인 성공 시 쿠폰도 로드
var _origLoadUsers = loadUsers;
loadUsers = async function() {
  await _origLoadUsers();
  loadCoupons();
};
</script>
</body>
</html>
